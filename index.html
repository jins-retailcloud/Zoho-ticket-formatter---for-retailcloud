<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retailcloud Ticket Formatter</title>

<style>
body{
font-family:Arial;
padding:40px;
background:#f5f5f5;
}

textarea{
width:100%;
height:300px;
padding:10px;
}

button{
padding:12px 25px;
margin-top:15px;
font-size:16px;
cursor:pointer;
}

#output{
margin-top:30px;
line-height:1.6;
font-size:16px;
}

a{
text-decoration:none;
color:#0b57d0;
}
</style>

</head>

<body>

<h2>Zoho Ticket Formatter</h2>

<p>Paste up to 10 tickets:</p>

<textarea id="pasteData"></textarea>

<br>

<button onclick="formatTickets()">Generate & Copy</button>

<div id="output"></div>

<script>

function formatTickets(){

const rawData=document.getElementById("pasteData").value.trim()

if(!rawData){
alert("Paste ticket data")
return
}

const tickets=rawData.split(/\n\s*\n/).slice(0,10)

let html=""
let copyText=""

tickets.forEach(ticket=>{

const id=ticket.match(/Ticket ID:\s*(#[^\s]+)/i)
const subject=ticket.match(/Subject:\s*(.+)/i)
const url=ticket.match(/URL:\s*(https?:\/\/\S+)/i)

if(id && subject && url){

html+=`<div><a href="${url[1]}" target="_blank">${id[1]}</a> | ${subject[1]}</div>`

copyText+=`${id[1]} | ${subject[1]}\n`

}

})

document.getElementById("output").innerHTML=html

navigator.clipboard.writeText(copyText.trim())

alert("Copied to clipboard")

}

</script>

</body>
</html>
